name: Unit Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          version: "0.8.22"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: uv sync

      - name: Cache HuggingFace model weights
        uses: actions/cache@v4
        with:
          path: ~/.cache/huggingface
          key: hf-protectai-deberta-v3-prompt-injection-v2-${{ runner.os }}

      - name: Download DeBERTa model weights
        run: |
          uv run python -c "
          from transformers import pipeline
          pipeline('text-classification', model='protectai/deberta-v3-base-prompt-injection-v2', truncation=True, max_length=512)
          print('Model downloaded and cached.')
          "

      - name: Run unit tests
        run: uv run pytest tests/test_deberta_api.py -v
